<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>随码短视频封面</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #17211b; color: #f2eadb; font-family: "Microsoft YaHei", sans-serif; }
    header { padding: 28px max(24px, 5vw); border-bottom: 1px solid rgba(242,234,219,.16); }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    p { margin: 8px 0 0; color: rgba(242,234,219,.65); }
    main { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(260px, .72fr); gap: 28px; align-items: start; padding: 32px max(24px, 5vw) 56px; }
    figure { margin: 0; border: 1px solid rgba(242,234,219,.16); background: #101a14; box-shadow: 0 24px 70px rgba(0,0,0,.28); }
    img { display: block; width: 100%; height: auto; }
    figcaption { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 13px 15px; font-size: 13px; }
    a { color: #ef8c69; text-decoration: none; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } figure:last-child { width: min(100%, 460px); } }
  </style>
</head>
<body>
  <header>
    <h1>随码 · 短视频封面</h1>
    <p>Image 2 场景生成，真实品牌素材与确定性文字排版。</p>
  </header>
  <main>
    <figure>
      <img src="../artifacts/anytimevibe-social-covers/anytimevibe-cover-landscape-1920x1080.jpg" alt="随码横版短视频封面" />
      <figcaption><strong>横版 · 1920×1080</strong><a href="../artifacts/anytimevibe-social-covers/anytimevibe-cover-landscape-1920x1080.jpg">打开原图</a></figcaption>
    </figure>
    <figure>
      <img src="../artifacts/anytimevibe-social-covers/anytimevibe-cover-portrait-1080x1920.jpg" alt="随码竖版短视频封面" />
      <figcaption><strong>竖版 · 1080×1920</strong><a href="../artifacts/anytimevibe-social-covers/anytimevibe-cover-portrait-1080x1920.jpg">打开原图</a></figcaption>
    </figure>
  </main>
</body>
</html>
