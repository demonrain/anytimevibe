name: Build desktop clients

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            command: package:win
            artifact: windows-client
            path: |
              apps/agent/release/*.exe
              apps/agent/release/*.blockmap
              apps/agent/release/latest.yml
          - os: macos-latest
            command: package:mac
            artifact: macos-client
            path: |
              apps/agent/release/*.dmg
              apps/agent/release/*.zip
              apps/agent/release/latest-mac.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: startsWith(github.ref, 'refs/tags/v')
        run: node -e "const fs=require('fs');const file='apps/agent/package.json';const pkg=require('./'+file);pkg.version=process.env.RELEASE_VERSION.replace(/^v/,'');fs.writeFileSync(file,JSON.stringify(pkg,null,2)+'\n')"
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
      - run: pnpm --filter @anytimevibe/agent ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - run: gh release create "$GITHUB_REF_NAME" release/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
