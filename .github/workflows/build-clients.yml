name: Build desktop clients

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: package:win
            artifact: windows-client
            path: |
              apps/agent/release/*.exe
              apps/agent/release/*.blockmap
              apps/agent/release/latest.yml
          - os: macos-latest
            command: package:mac
            artifact: macos-client
            path: |
              apps/agent/release/*.dmg
              apps/agent/release/*.zip
              apps/agent/release/latest-mac.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: startsWith(github.ref, 'refs/tags/v')
        run: node -e "const fs=require('fs');const file='apps/agent/package.json';const pkg=require('./'+file);pkg.version=process.env.RELEASE_VERSION.replace(/^v/,'');fs.writeFileSync(file,JSON.stringify(pkg,null,2)+'\n')"
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
      - run: pnpm --filter @anytimevibe/agent ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # gh release create needs a git checkout for repository context.
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t assets < <(find release-assets -type f | sort)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found under release-assets/"
            exit 1
          fi
          echo "Publishing ${#assets[@]} asset(s) to ${GITHUB_REF_NAME}:"
          printf ' - %s\n' "${assets[@]}"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading assets..."
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            echo "Creating release ${GITHUB_REF_NAME}..."
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --generate-notes \
              --title "随码 ${GITHUB_REF_NAME}" \
              --latest
          fi
