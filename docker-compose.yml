services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: anytimevibe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: anytimevibe
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anytimevibe"]
      interval: 5s
      timeout: 3s
      retries: 20

  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://anytimevibe:${POSTGRES_PASSWORD}@postgres:5432/anytimevibe
      SETUP_TOKEN: ${SETUP_TOKEN}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PUBLIC_ORIGIN: https://${DOMAIN}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      MAX_USERS: ${MAX_USERS:-100}
      WINDOWS_CLIENT_URL: ${WINDOWS_CLIENT_URL:-}
      MAC_CLIENT_URL: ${MAC_CLIENT_URL:-}
      UPDATE_FEED_URL: ${UPDATE_FEED_URL:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relay
      - web

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
